merge_protections:
  - name: maintainer
    if:
      - "author=@opendatahub-io/code-review-skills"
    success_conditions:
      - "#approved-reviews-by>=1"
      - check-success = Lint
      - -draft
      - -conflict

  - name: default
    if:
      - "-author=@opendatahub-io/code-review-skills"
    success_conditions:
      - "#approved-reviews-by>=2"
      - check-success = Lint
      - -draft
      - -conflict

merge_protections_settings:
  auto_merge_conditions: true
  reporting_method: check-runs

merge_queue:
  max_parallel_checks: 1

queue_rules:
  - name: default
    merge_method: squash
